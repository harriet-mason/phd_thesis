project:
  type: book
  output-dir: docs

execute:
  keep-md: true

book:
  title: "Visualising Uncertainty: Conceptual Framework, Software, and Perception"
  author: "Harriet Mason"
  repo-url: https://github.com/harriet-mason/phd_thesis
  repo-branch: master
  downloads: [pdf]
  chapters:
    - text: "Front matter"
      file: index.qmd
    - "01-chap1.qmd"
    - "02-chap2.qmd"
    - "03-chap3.qmd"
    - "04-chap4.qmd"
    - "05-chap5.qmd"
    - "refs.qmd"
    - "A-appA.qmd"
  sidebar:
    style: "docked"

bibliography: thesisrefs.bib
csl: american-statistical-association.csl
degreetype: Doctor of Philosophy
submitted: 2024
affiliation: Department of Econometrics & Business Statistics
degrees: 'B.Comm. (Hons), Monash University'

format:
  monashthesis-html:
    number-depth: 3
  monashthesis-pdf:
    number-depth: 3
    toc-depth: 3
